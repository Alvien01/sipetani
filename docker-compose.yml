version: '3.8'

services:
  app:
    build: .
    container_name: sipetani_app
    ports:
      - "8002:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: sipetani_phpmyadmin
    restart: always
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: sipetani_db
    restart: always
    environment:
      MYSQL_DATABASE: sipetani
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: sipetani
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
